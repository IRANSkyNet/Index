      <link rel="stylesheet" href="https://see5.net/wp-content/themes/see5/font/yekanbakh/webfonts/fontiran.css">
      <style>
    :root{
      --toolbar-h: 56px;
      --brand: #ff4d67;
      --bg: #0f172a;
      --muted: #e5e7eb;
      --chip: #f3f4f6;
      --chip-text:#111827;
    }
    


    *{box-sizing:border-box;font-family:Yekan Bakh FaNum;}
    
    a{
        text-decoration:none;
    }
    
    
    html,body{height:100%;margin:0}
    body{font-family:Yekan Bakh FaNum;background:#111827;color:#fff}

    /* Toolbar */
    .toolbar{position:fixed;inset:0 0 auto 0;height:var(--toolbar-h);display:flex;gap:.75rem;align-items:center;padding:.5rem .75rem;background: #FFF;border-bottom:1px solid #0b253d;z-index:10}
    .toolbar .spacer{flex:1}
    .btn{appearance:none;border:0;border-radius:.6rem;background:var(--chip);color:var(--chip-text);padding:.5rem .75rem;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:.35rem;white-space:nowrap}
    .btn:hover{filter:brightness(.95)}
    .btn.ghost{background:transparent;color:#cbd5e1;border:1px solid #334155}
    .btn.primary{

    color: #FFF;
    background: rgb(0 0 0);
    border-radius: 12px;
    font-size: 14px;
    }

    .seg{display:flex;background:#0b1324;border:1px solid #1f2a44;border-radius:.6rem;overflow:hidden}
    .seg button{background:transparent;border:0;color:#cbd5e1;padding:.5rem .75rem;cursor:pointer}
    .seg button.active{background:#1f2a44;color:#fff}

    .input{display:flex;align-items:center;gap:.5rem;background:#0b1324;border:1px solid #1f2a44;border-radius:.6rem;padding:.25rem .5rem;min-width:260px}
    .input input{all:unset;direction:ltr;color:#e5e7eb;caret-color:#fff;width:100%}

    main{position:fixed;inset:var(--toolbar-h) 0 0 0;display:grid;place-items:center;background:radial-gradient(1200px 500px at 50% -100px,#112240 5%,#0b1220 60%,#0b1220 100%)}

    /* Device stage */
    .stage{position:relative;width:100%;height:100%;display:grid;place-items:center;padding:1rem}
    .device{position:relative;background:#000;border-radius:1rem;box-shadow:0 15px 60px rgba(0,0,0,.55),0 0 0 1px #1f2a44 inset;overflow:hidden}
    .device iframe{display:block;width:100%;height:100%;border:0;background:#fff}

    /* Badges */
    .badge{position:absolute;top:.75rem;left:.75rem;background:#0b1324aa;border:1px solid #1f2a44;color:#cbd5e1;font-size:.8rem;padding:.25rem .5rem;border-radius:.5rem;backdrop-filter: blur(4px)}
    /* Responsive helpers on very small screens — allow full bleed */
    @media (max-width:768px){
      .toolbar{gap:.5rem}
      .toolbar .seg , .stage .badge{display:none}
      .input{display:none}
    }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div class="toolbar" role="toolbar" aria-label="نوار کنترل پیش‌نمایش">
    <div class="seg" role="group" aria-label="انتخاب دستگاه">
      <button  id="mode-desktop" title="دسکتاپ (100%)">دسکتاپ</button>
      <button id="mode-tablet" title="تبلت 768×1024">تبلت</button>
      <button id="mode-mobile" title="موبایل 375×667">موبایل</button>
      <button  class="active" id="mode-fluid" title="تمام‌عرض">تمام‌عرض</button>
    </div>

    <button class="btn ghost" id="rotate" style="display:none" title="چرخش جهت دستگاه">↻ چرخش</button>
    <button class="btn ghost" id="reload"  style="display:none" title="بارگذاری مجدد آیفرم">⟳ ریلود</button>

    <label class="input" title=" قالب" style="display:none"  >
      <input id="url" readonly="true" style="display:none" placeholder="قالب شرکت دوربین مدار بسته : مناسب سایت شرکت امنیتی" />
    </label>

    <div class="spacer"></div>

    <button class="btn ghost" id="open-full" style="display:none" title="بازکردن نسخه کامل در تب جدید">نمایش کامل</button>
    <a class="btn primary" id="cta" href="#" target="_blank" rel="noopener">ساخت سایت با این قالب</a>
  </div>

  <!-- Stage / Device -->
  <main>
    <div class="stage">
      <div class="device" id="device" style="width:100%;height:100%">
        <span class="badge" id="badge">دسکتاپ</span>
        <iframe id="frame" allow="fullscreen" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </main>

  <script>
    (function(){
      "use strict";

      // --- Util: get query params
      const params = new URLSearchParams(location.search);
      const $ = (sel)=>document.querySelector(sel);

      // Defaults
      const DEFAULT_URL = "https://qt46100.see5.ir/"  ; // نمونه دموی جواهرات
      const CTA_URL     = "https://see5.net/cctv-new-theme/?install";
      const TEMPLATE    = params.get('name') || 'قالب';

      // Elements
      const frame  = $('#frame');
      const device = $('#device');
      const badge  = $('#badge');
      const urlInp = $('#url');
      const openBtn= $('#open-full');
      const cta    = $('#cta');

      // Buttons
      const btnDesktop = $('#mode-desktop');
      const btnTablet  = $('#mode-tablet');
      const btnMobile  = $('#mode-mobile');
      const btnFluid   = $('#mode-fluid');
      const btnRotate  = $('#rotate');
      const btnReload  = $('#reload');

      // State
      let mode = 'desktop';
      let portrait = true; // برای چرخش موبایل/تبلت

      // Init
      function setURL(u){
        frame.src = u;
        urlInp.value = u;
        openBtn.onclick = ()=> window.open(u,'_blank','noopener');
      }

      function setCTA(){
        cta.textContent = 'ساخت سایت با این قالب';
        cta.href = CTA_URL;
        cta.title = TEMPLATE;
      }

      function activate(btn){
        [btnDesktop,btnTablet,btnMobile,btnFluid].forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
      }

      function applySize(){
        const stageW = document.documentElement.clientWidth;
        const stageH = document.documentElement.clientHeight - parseInt(getComputedStyle(document.documentElement).getPropertyValue('--toolbar-h'));
        let w,h,label;
        if(mode==='desktop'){
          w = Math.min(1280, stageW - 32); // padding
          h = Math.min(800,  stageH - 32);
          label = 'دسکتاپ';
        }else if(mode==='tablet'){
          const p = portrait? [768,1024] : [1024,768];
          w=p[0]; h=p[1]; label = `تبلت ${p[0]}×${p[1]}`;
        }else if(mode==='mobile'){
          const p = portrait? [375,667] : [667,375];
          w=p[0]; h=p[1]; label = `موبایل ${p[0]}×${p[1]}`;
        }else{ // fluid
          w = stageW; h = stageH; label = 'تمام‌عرض';
        }
        device.style.width  = w + 'px';
        device.style.height = h + 'px';
        badge.textContent = label;
      }

      // Mode handlers
      btnDesktop.addEventListener('click', ()=>{mode='desktop'; activate(btnDesktop); applySize();});
      btnTablet .addEventListener('click', ()=>{mode='tablet' ; activate(btnTablet ); applySize();});
      btnMobile .addEventListener('click', ()=>{mode='mobile' ; activate(btnMobile ); applySize();});
      btnFluid  .addEventListener('click', ()=>{mode='fluid'  ; activate(btnFluid  ); applySize();});

      // Rotate for tablet/mobile
      btnRotate.addEventListener('click', ()=>{portrait = !portrait; if(mode==='desktop'||mode==='fluid') return; applySize();});
      // Reload iframe
      btnReload.addEventListener('click', ()=>{ try{ frame.contentWindow.location.reload(); }catch(e){ frame.src = frame.src; }});

      // URL input
      urlInp.addEventListener('keydown', (e)=>{
        if(e.key==='Enter'){
          const v = urlInp.value.trim();
          if(v){ setURL(v); }
        }
      });

      // Resize listener
      window.addEventListener('resize', applySize);

      // Shortcuts
      window.addEventListener('keydown', (e)=>{
        if(e.altKey && !e.shiftKey){
          if(e.key==='1'){btnDesktop.click();}
          if(e.key==='2'){btnTablet.click();}
          if(e.key==='3'){btnMobile.click();}
          if(e.key==='4'){btnFluid.click();}
          if(e.key.toLowerCase()==='r'){btnRotate.click();}
        }
      });

      // Boot
        setURL(DEFAULT_URL);
      setCTA();
      applySize();
    })();
  </script>
</body>
</html>
